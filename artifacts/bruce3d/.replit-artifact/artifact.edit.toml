kind = "web"
previewPath = "/"
title = "BRUCE 3D SHOP"
version = "1.0.0"
id = "artifacts/bruce3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22923

[services.development]
run = "pnpm --filter @workspace/bruce3d run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bruce3d", "run", "build" ]
publicDir = "artifacts/bruce3d/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22923"
BASE_PATH = "/"
