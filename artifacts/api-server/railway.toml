[build]
builder = "NIXPACKS"
buildCommand = "cd ../.. && npm install -g pnpm@latest && pnpm install && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
