[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@9 && cd ../.. && pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["cd ../.. && pnpm --filter @workspace/db run push && pnpm --filter @workspace/api-server run build"]

[start]
cmd = "node --enable-source-maps ./dist/index.mjs"
