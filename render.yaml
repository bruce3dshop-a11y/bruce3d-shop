services:
  - type: web
    name: bruce3d-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: cd ../.. && npm install -g pnpm@latest && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./dist/index.mjs
    healthCheckPath: /api/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bruce3d-db
          property: connectionString

  - type: web
    name: bruce3d-frontend
    runtime: node
    rootDir: artifacts/bruce3d
    buildCommand: cd ../.. && npm install -g pnpm@latest && pnpm install && pnpm --filter @workspace/bruce3d run build && npm install -g serve
    startCommand: serve -s ./dist -l $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        fromService:
          name: bruce3d-api
          type: web
          property: host

databases:
  - name: bruce3d-db
    databaseName: bruce3d
    user: bruce3d
    plan: free
